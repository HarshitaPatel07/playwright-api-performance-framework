name: Lint and Code Quality
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
jobs:
  lint-python:
    name: Python Linter (api-tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install linting tool
        run: pip install ruff

      - name: Check formatting with ruff
        run: ruff check .
        working-directory: api-tests
  
  lint-typescript:
    name: Typescript Linter (ui-tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui-tests/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui-tests

      - name: Check formatting with eslint
        run: npx eslint .
        working-directory: ui-tests