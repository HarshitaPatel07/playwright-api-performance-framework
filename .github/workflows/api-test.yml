name: API Tests
on: 
  push:
    branches: ["main"]
    paths:
      - "api-tests/**"
  pull_request:
    paths:
      - "api-tests/**"
jobs:
  api-tests:
    name: Run API Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify ACCESS_TOKEN secret
        run: |
          python - <<'PY'
          import os
          token = os.getenv('ACCESS_TOKEN')
          print('ACCESS_TOKEN set:', bool(token))
          print('ACCESS_TOKEN length:', len(token or '0'))
          PY
        working-directory: api-tests
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

      - name: Run API tests
        run: pytest tests/ -v --tb=short
        working-directory: api-tests
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}