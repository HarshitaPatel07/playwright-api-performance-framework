name: API Tests
on: 
  push:
    branches: ["main"]
    paths:
      - "api-tests/**"
  pull_request:
    paths:
      - "api-tests/**"
jobs:
  api-tests:
    name: Run API Test (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify ACCESS_TOKEN secret
        run: |
          python - <<'PY'
          import os
          from config import ACCESS_TOKEN, BASE_URL
          print('ACCESS_TOKEN set:', bool(ACCESS_TOKEN))
          print('BASE_URL:', BASE_URL)
          PY
        working-directory: api-tests
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

       - name: Verify token in headers
        run: |
          python - <<'PY'
          import os
          import requests

          token = os.getenv("ACCESS_TOKEN")
          headers = {
              "Content-Type": "application/json",
              "Authorization": f"Bearer {token}"
          }
          print("Headers:", headers)
          response = requests.get("https://gorest.co.in/public/v2/users", headers=headers)
          print("Status:", response.status_code)
          print("Response:", response.text[:200])
          PY
        working-directory: api-tests
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

      - name: Run API tests
        run: pytest tests/ -v --tb=short
        working-directory: api-tests
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}